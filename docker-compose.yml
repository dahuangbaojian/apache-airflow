name: ${COMPOSE_PROJECT_NAME:-airflow-prod}

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-local/airflow:3.1.8}
  env_file:
    - .env
  environment: &airflow-env
    # Core executor / database
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB:-airflow}

    # Celery broker / backend
    AIRFLOW__CELERY__BROKER_URL: redis://:${AIRFLOW_REDIS_PASSWORD:-change-me}@airflow-redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB:-airflow}

    # Airflow 3 execution API. Scheduler and workers must reach the in-cluster API server.
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/

    # Security. Keep these identical across every Airflow component.
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:?set FERNET_KEY in .env}
    AIRFLOW__API__SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
    AIRFLOW__API_AUTH__JWT_SECRET: ${JWT_SECRET:-${SECRET_KEY}}

    # Runtime settings
    AIRFLOW__LOGGING__LOGGING_LEVEL: ${AIRFLOW_LOGGING_LEVEL:-INFO}
    AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT: ${AIRFLOW_WORKER_LOG_SERVER_PORT:-8793}
    AIRFLOW__CORE__DEFAULT_TIMEZONE: ${AIRFLOW_TIMEZONE:-Asia/Shanghai}
    AIRFLOW__CORE__HOSTNAME_CALLABLE: airflow.utils.net.get_host_ip_address
    TZ: ${TZ:-Asia/Shanghai}

    # Spark client defaults. Containers submit jobs to a Spark service running on the host.
    SPARK_MASTER_URL: ${SPARK_MASTER_URL:-spark://host.docker.internal:7077}
    AIRFLOW_CONN_SPARK_DEFAULT: ${AIRFLOW_CONN_SPARK_DEFAULT:-${SPARK_MASTER_URL:-spark://host.docker.internal:7077}}
    SPARK_DEPLOY_MODE: ${SPARK_DEPLOY_MODE:-client}

    # Iceberg defaults for the sample Spark standalone integration.
    ICEBERG_CATALOG_NAME: ${ICEBERG_CATALOG_NAME:-iceberg_local}
    ICEBERG_CATALOG_TYPE: ${ICEBERG_CATALOG_TYPE:-hadoop}
    ICEBERG_WAREHOUSE: ${ICEBERG_WAREHOUSE:-s3://warehouse/iceberg}
    ICEBERG_S3_ENDPOINT: ${ICEBERG_S3_ENDPOINT:-http://minio.example.com:9000}
    ICEBERG_S3_ACCESS_KEY_ID: ${ICEBERG_S3_ACCESS_KEY_ID:-replace-me}
    ICEBERG_S3_SECRET_ACCESS_KEY: ${ICEBERG_S3_SECRET_ACCESS_KEY:-replace-me}
    ICEBERG_S3_PATH_STYLE_ACCESS: ${ICEBERG_S3_PATH_STYLE_ACCESS:-true}
    ICEBERG_AWS_JAR: ${ICEBERG_AWS_JAR:-iceberg-aws-bundle-1.10.1.jar}
    ICEBERG_SPARK_RUNTIME_JAR: ${ICEBERG_SPARK_RUNTIME_JAR:-iceberg-spark-runtime-3.5_2.12-1.10.1.jar}

  volumes:
    - ./logs:/opt/airflow/logs
  extra_hosts:
    - "host.docker.internal:host-gateway"

  user: "${AIRFLOW_UID:-50000}:0"

  depends_on:
    airflow-postgres:
      condition: service_healthy
    airflow-redis:
      condition: service_healthy

services:
  airflow-redis:
    image: redis:7.2
    command: ["redis-server", "--requirepass", "${AIRFLOW_REDIS_PASSWORD:-change-me}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${AIRFLOW_REDIS_PASSWORD:-change-me}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_POSTGRES_USER:-airflow} -d ${AIRFLOW_POSTGRES_DB:-airflow}"]
      interval: 5s
      timeout: 5s
      retries: 30

  airflow-init:
    <<: *airflow-common
    command: bash -lc "airflow db migrate"
    restart: "no"

  airflow-api-server:
    <<: *airflow-common
    command: api-server
    ports:
      - "${AIRFLOW_API_PORT:-18081}:8080"
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: unless-stopped

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: unless-stopped

  flower:
    <<: *airflow-common
    command: celery flower
    ports:
      - "${AIRFLOW_FLOWER_PORT:-5555}:5555"
    profiles: ["flower"]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
